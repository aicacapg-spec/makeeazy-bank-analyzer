# Render.com deployment — single service (React frontend + FastAPI backend)
# Free tier compatible

services:
  - type: web
    name: makeeazy-bank-analyzer
    runtime: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt && cd frontend && npm install && npm run build && cd .."
    startCommand: "cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./makeeazy.db
      - key: UPLOAD_DIR
        value: ./uploads
      - key: REPORTS_DIR
        value: ./reports
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
